version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: revisa-db-local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: revisa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_revisa:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data_revisa: